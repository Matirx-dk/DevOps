# Tomcat
server:
  port: 8080

# Spring
spring: 
  application:
    # 应用名称
    name: aidevops-gateway
  profiles:
    # 环境配置
    active: dev
  cloud:
    nacos:
      discovery:
        # 服务注册地址
        server-addr: aidevops-nacos.aidevops-cloud.svc.cluster.local:8848
      config:
        # 配置中心地址
        server-addr: aidevops-nacos.aidevops-cloud.svc.cluster.local:8848
        file-extension: yml
        group: DEFAULT_GROUP
        refresh-enabled: true
        shared-configs:
          - data-id: application-${spring.profiles.active}.yml
            group: DEFAULT_GROUP
            refresh: true
        extension-configs:
          - data-id: ${spring.application.name}-${spring.profiles.active}.yml
            group: DEFAULT_GROUP
            refresh: true
    sentinel:
      # 取消控制台懒加载
      eager: true
      transport:
        # 控制台地址
        dashboard: aidevops-nacos.aidevops-cloud.svc.cluster.local:8718
      # nacos配置持久化
      datasource:
        ds1:
          nacos:
            server-addr: aidevops-nacos.aidevops-cloud.svc.cluster.local:8848
            dataId: sentinel-aidevops-gateway
            groupId: DEFAULT_GROUP
            data-type: json
            rule-type: gw-flow
