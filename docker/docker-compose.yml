version: '3.8'
services:
  aidevops-mysql:
    container_name: aidevops-mysql
    image: mysql:5.7
    build: ./mysql
    ports:
      - "3306:3306"
    volumes:
      - ./mysql/conf:/etc/mysql/conf.d
      - ./mysql/logs:/logs
      - ./mysql/data:/var/lib/mysql
    command:
      - mysqld
      - --innodb-buffer-pool-size=80M
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+8:00
      - --lower-case-table-names=1
    environment:
      MYSQL_DATABASE: ry-cloud
      MYSQL_ROOT_PASSWORD: password

  aidevops-redis:
    container_name: aidevops-redis
    image: redis
    build: ./redis
    ports:
      - "6379:6379"
    volumes:
      - ./redis/conf/redis.conf:/home/aidevops/redis/redis.conf
      - ./redis/data:/data
    command: redis-server /home/aidevops/redis/redis.conf

  aidevops-nacos:
    container_name: aidevops-nacos
    image: nacos/nacos-server:v3.0.2
    build: ./nacos
    ports:
      - "8848:8848"
      - "9848:9848"
      - "9849:9849"
    volumes:
      - ./nacos/logs:/home/nacos/logs
      - ./nacos/conf/application.properties:/home/nacos/conf/application.properties
    environment:
      - MODE=standalone
      - NACOS_AUTH_ENABLE=true
    depends_on:
      - aidevops-mysql

  aidevops-nginx:
    container_name: aidevops-nginx
    image: nginx
    build: ./nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/html/dist:/home/aidevops/projects/aidevops-ui
      - ./nginx/conf/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/logs:/var/log/nginx
      - ./nginx/conf.d:/etc/nginx/conf.d
