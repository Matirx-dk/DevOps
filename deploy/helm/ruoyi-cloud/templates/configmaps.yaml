apiVersion: v1
kind: ConfigMap
metadata:
  name: ruoyi-gateway-local
  namespace: {{ .Release.Namespace }}
data:
  application.yml: |
    spring:
      data:
        redis:
          host: ruoyi-redis.{{ .Release.Namespace }}.svc.cluster.local
          port: 6379
          password:
      cloud:
        gateway:
          server:
            webflux:
              discovery:
                locator:
                  lowerCaseServiceId: true
                  enabled: true
              routes:
                - id: ruoyi-auth
                  uri: lb://ruoyi-auth
                  predicates:
                    - Path=/auth/**
                  filters:
                    - name: CacheRequestBody
                      args:
                        bodyClass: java.lang.String
                    - ValidateCodeFilter
                    - StripPrefix=1
                - id: ruoyi-system
                  uri: lb://ruoyi-system
                  predicates:
                    - Path=/system/**
                  filters:
                    - StripPrefix=1
    security:
      captcha:
        enabled: true
        type: math
      xss:
        enabled: true
        excludeUrls:
          - /system/notice
      ignore:
        whites:
          - /auth/logout
          - /auth/login
          - /auth/register
          - /*/v2/api-docs
          - /*/v3/api-docs
          - /csrf
    springdoc:
      webjars:
        prefix:
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ruoyi-system-local
  namespace: {{ .Release.Namespace }}
data:
  application.yml: |
    spring:
      data:
        redis:
          host: ruoyi-redis.{{ .Release.Namespace }}.svc.cluster.local
          port: 6379
          password:
      datasource:
        druid:
          stat-view-servlet:
            enabled: true
            loginUsername: ruoyi
            loginPassword: 123456
        dynamic:
          druid:
            initial-size: 1
            min-idle: 1
            maxActive: 10
            maxWait: 60000
            connectTimeout: 30000
            socketTimeout: 60000
            timeBetweenEvictionRunsMillis: 60000
            minEvictableIdleTimeMillis: 300000
            validationQuery: SELECT 1
            testWhileIdle: true
            testOnBorrow: false
            testOnReturn: false
            poolPreparedStatements: true
            maxPoolPreparedStatementPerConnectionSize: 20
            filters: stat,slf4j
            connectionProperties: druid.stat.mergeSql\=true;druid.stat.slowSqlMillis\=5000
          datasource:
            master:
              driver-class-name: com.mysql.cj.jdbc.Driver
              url: jdbc:mysql://ruoyi-mysql.{{ .Release.Namespace }}.svc.cluster.local:3306/{{ .Values.mysql.database }}?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
              username: root
              password: {{ .Values.mysql.rootPassword }}
    mybatis:
      typeAliasesPackage: com.ruoyi.system
      mapperLocations: classpath*:mapper/**/*.xml
    springdoc:
      gatewayUrl: http://ruoyi-gateway.{{ .Release.Namespace }}.svc.cluster.local:8080/${spring.application.name}
      api-docs:
        enabled: true
{{- if .Values.sqlInit.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ruoyi-sql-init
  namespace: {{ .Release.Namespace }}
data:
  01-ry-config.sql: |
{{ .Values.sqlInit.ryConfigSql | indent 4 }}
  02-ry-cloud.sql: |
{{ .Values.sqlInit.ryCloudSql | indent 4 }}
  03-quartz.sql: |
{{ .Values.sqlInit.quartzSql | indent 4 }}
{{- end }}
