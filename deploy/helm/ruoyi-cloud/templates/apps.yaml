apiVersion: apps/v1
kind: Deployment
metadata:
  name: ruoyi-mysql
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ruoyi-mysql
  template:
    metadata:
      labels:
        app: ruoyi-mysql
    spec:
      initContainers:
        - name: init-perms
          image: {{ .Values.images.initPerms }}
          command: ['sh','-c','mkdir -p /var/lib/mysql && chown -R 999:999 /var/lib/mysql']
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
      containers:
        - name: mysql
          image: {{ .Values.mysql.image }}
          imagePullPolicy: IfNotPresent
          args:
            - --character-set-server=utf8mb4
            - --collation-server=utf8mb4_unicode_ci
            - --lower-case-table-names=1
            - --default-time-zone=+8:00
            - --default-authentication-plugin=mysql_native_password
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: {{ .Values.mysql.rootPassword | quote }}
            - name: MYSQL_DATABASE
              value: {{ .Values.mysql.database | quote }}
          ports:
            - containerPort: 3306
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
      volumes:
        - name: mysql-data
          persistentVolumeClaim:
            claimName: ruoyi-mysql-pvc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ruoyi-redis
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ruoyi-redis
  template:
    metadata:
      labels:
        app: ruoyi-redis
    spec:
      containers:
        - name: redis
          image: {{ .Values.redis.image }}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ruoyi-nacos
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ruoyi-nacos
  template:
    metadata:
      labels:
        app: ruoyi-nacos
    spec:
      containers:
        - name: nacos
          image: {{ .Values.nacos.image }}
          imagePullPolicy: IfNotPresent
          env:
            - name: MODE
              value: standalone
            - name: SPRING_DATASOURCE_PLATFORM
              value: mysql
            - name: MYSQL_SERVICE_HOST
              value: ruoyi-mysql.{{ .Release.Namespace }}.svc.cluster.local
            - name: MYSQL_SERVICE_PORT
              value: '3306'
            - name: MYSQL_SERVICE_DB_NAME
              value: ry-config
            - name: MYSQL_SERVICE_USER
              value: root
            - name: MYSQL_SERVICE_PASSWORD
              value: {{ .Values.mysql.rootPassword | quote }}
          ports:
            - containerPort: 8848
            - containerPort: 9848
            - containerPort: 9849
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ruoyi-auth
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ruoyi-auth
  template:
    metadata:
      labels:
        app: ruoyi-auth
    spec:
      containers:
        - name: auth
          image: {{ .Values.auth.image }}
          imagePullPolicy: IfNotPresent
          env:
            - name: SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR
              value: ruoyi-nacos.{{ .Release.Namespace }}.svc.cluster.local:8848
            - name: SPRING_CLOUD_NACOS_CONFIG_SERVER_ADDR
              value: ruoyi-nacos.{{ .Release.Namespace }}.svc.cluster.local:8848
            - name: SPRING_DATA_REDIS_HOST
              value: ruoyi-redis.{{ .Release.Namespace }}.svc.cluster.local
            - name: SPRING_DATA_REDIS_PORT
              value: '6379'
          ports:
            - containerPort: {{ .Values.auth.servicePort }}
---
