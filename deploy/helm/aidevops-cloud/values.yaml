nameOverride: ""
fullnameOverride: ""

namespaceOverride: ""

images:
  initPerms: harbor.zoudekang.cloud/dockerhub-proxy/library/busybox:1.36

mysql:
  enabled: true
  rootPassword: password
  database: ry-cloud
  image: harbor.zoudekang.cloud/dockerhub-proxy/library/mysql:8.0
  nfs:
    server: 192.168.1.104
    path: /data/nfs/share/aidevops-mysql
    size: 20Gi

redis:
  enabled: true
  image: harbor.zoudekang.cloud/dockerhub-proxy/library/redis:7-alpine

nacos:
  enabled: true
  image: harbor.zoudekang.cloud/dockerhub-proxy/nacos/nacos-server:v2.2.3
  service:
    port: 8848
    grpc1: 9848
    grpc2: 9849

auth:
  image: CHANGE_ME_REGISTRY/aidevops-auth:CHANGE_ME_TAG
  servicePort: 9200

system:
  image: CHANGE_ME_REGISTRY/aidevops-system:CHANGE_ME_TAG
  servicePort: 9201

gateway:
  image: CHANGE_ME_REGISTRY/aidevops-gateway:CHANGE_ME_TAG
  servicePort: 8080

ui:
  image: CHANGE_ME_REGISTRY/aidevops-ui:CHANGE_ME_TAG
  servicePort: 80

ingress:
  enabled: true
  className: nginx
  host: devops.zoudekang.cloud
  uiPath: /
  nacosPath: /nacos

sqlInit:
  enabled: false
  mode: bundled
  bundled:
    ryConfigFile: files/ry_config.sql
    ryCloudFile: files/ry_cloud.sql
    quartzFile: files/quartz.sql
  inline:
    ryConfigSql: ""
    ryCloudSql: ""
    quartzSql: ""
