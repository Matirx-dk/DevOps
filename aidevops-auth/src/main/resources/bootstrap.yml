server: 
  port: 9200

spring: 
  application:
    name: aidevops-auth
  profiles:
    active: dev
  cloud:
    nacos:
      discovery:
        server-addr: aidevops-nacos.aidevops-cloud.svc.cluster.local:8848
      config:
        server-addr: aidevops-nacos.aidevops-cloud.svc.cluster.local:8848
  config:
    file-extension: yml
    import:
      - nacos:application-${spring.profiles.active}.${spring.config.file-extension}
      - nacos:${spring.application.name}-${spring.profiles.active}.${spring.config.file-extension}
