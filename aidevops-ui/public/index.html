<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="renderer" content="webkit">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 128 128'%3E%3Cdefs%3E%3ClinearGradient id='g1' x1='18' y1='18' x2='110' y2='110' gradientUnits='userSpaceOnUse'%3E%3Cstop stop-color='%233FA9FF'/%3E%3Cstop offset='1' stop-color='%23215CFF'/%3E%3C/linearGradient%3E%3ClinearGradient id='g2' x1='37' y1='28' x2='90' y2='94' gradientUnits='userSpaceOnUse'%3E%3Cstop stop-color='%23E6F6FF' stop-opacity='0.95'/%3E%3Cstop offset='1' stop-color='%23FFFFFF' stop-opacity='0.82'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect x='10' y='10' width='108' height='108' rx='30' fill='url(%23g1)'/%3E%3Cpath d='M38 43C38 35.8203 43.8203 30 51 30H77C84.1797 30 90 35.8203 90 43V85C90 92.1797 84.1797 98 77 98H51C43.8203 98 38 92.1797 38 85V43Z' fill='url(%23g2)' fill-opacity='0.22'/%3E%3Cpath d='M45 45L64 34L83 45V66C83 78 75.3 89.1 64 94C52.7 89.1 45 78 45 66V45Z' fill='url(%23g2)'/%3E%3Cpath d='M56 60L62 66L74 53' stroke='%232C63FF' stroke-width='6' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
    <title><%= webpackConfig.name %></title>
    <!--[if lt IE 11]><script>window.location.href='/html/ie.html';</script><![endif]-->
    <style>
      html, body, #app {
        height: 100%;
        margin: 0;
        padding: 0;
      }
      body {
        background: #f4f7fb;
      }
      #loader-wrapper {
        position: fixed;
        inset: 0;
        z-index: 999999;
        background: linear-gradient(180deg, #f4f7fb 0%, #eef3fb 100%);
      }
      #loader {
        display: block;
        position: relative;
        left: 50%;
        top: 50%;
        width: 84px;
        height: 84px;
        margin: -86px 0 0 -42px;
        border-radius: 50%;
        border: 3px solid #dbe8f7;
        border-top-color: #409eff;
        animation: spin 1s linear infinite;
        z-index: 1001;
      }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      .loaded #loader {
        opacity: 0;
        transition: all .3s ease-out;
      }
      .loaded #loader-wrapper {
        visibility: hidden;
        transform: translateY(-100%);
        transition: all .3s 1s ease-out;
      }
      #loader-wrapper .load-card {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 320px;
        margin-left: -160px;
        margin-top: 18px;
        padding: 18px 20px;
        border-radius: 14px;
        background: #ffffff;
        border: 1px solid #e8eef7;
        box-shadow: 0 10px 28px rgba(31, 45, 61, 0.08);
        text-align: center;
        color: #1f2d3d;
      }
      #loader-wrapper .load-title {
        font-size: 18px;
        font-weight: 700;
        margin-bottom: 8px;
      }
      #loader-wrapper .load-subtitle {
        font-size: 13px;
        line-height: 1.8;
        color: #7a8aa0;
      }
      #loader-wrapper .load-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 88px;
        height: 28px;
        margin-bottom: 12px;
        padding: 0 12px;
        border-radius: 999px;
        background: #edf5ff;
        color: #409eff;
        font-size: 12px;
        font-weight: 700;
      }
      .no-js #loader-wrapper {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="loader-wrapper">
        <div id="loader"></div>
        <div class="load-card">
          <div class="load-badge">AIDevOps</div>
          <div class="load-title">正在加载系统</div>
          <div class="load-subtitle">正在初始化页面资源与菜单配置，请稍候。</div>
        </div>
      </div>
    </div>
  </body>
</html>
